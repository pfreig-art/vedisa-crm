version: '3.9'

services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vedisa}
      POSTGRES_USER: ${POSTGRES_USER:-vedisa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vedisa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vedisa}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vedisa}
      SECRET_KEY: ${SECRET_KEY:?required}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: always
    ports:
      - "80:80"

volumes:
  pg_data:
